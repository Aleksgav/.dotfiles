# Apple Magic Trackpad 2 — hid_magicmouse (in-tree kernel driver) tuning.
#
# The Trackpad 2 is reported as a multitouch touchpad, so the real "feel"
# (tap-to-click, two-finger scroll, swipe gestures, natural scrolling) is
# handled by libinput / mango's Trackpad section — not by this module. These
# options only cover what the driver itself exposes; we keep its wheel/button
# emulation OFF so it doesn't fight libinput's native multitouch handling.
#
# Available params (modinfo hid_magicmouse): emulate_3button,
# emulate_scroll_wheel, scroll_speed, scroll_acceleration, report_undeciphered.
# (middle_click_3finger only exists in out-of-tree AUR drivers, not in-tree.)
#
# Applies on the next module load — reconnect the trackpad or reboot.
options hid_magicmouse emulate_3button=0 emulate_scroll_wheel=0
