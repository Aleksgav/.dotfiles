# fuzzel launcher config -- see `man 5 fuzzel.ini`
# Linked to ~/.config/fuzzel by the arch package post_install.
# Nord theme to match the mango/leftwm desktop.

font=monospace:size=12

[colors]
background=2e3440ff
text=d8dee9ff
prompt=88c0d0ff
placeholder=4c566aff
input=d8dee9ff
match=a3be8cff
selection=434c5eff
selection-text=eceff4ff
selection-match=a3be8cff
border=5e81acff

[border]
width=1
radius=2
