# More option see https://github.com/DreamMaoMao/mango/wiki/

# Autostart
# mango is launched by uwsm (greetd -> tuigreet -> `uwsm start -- mango`).
# uwsm finalize exports WAYLAND_DISPLAY/DISPLAY into the D-Bus + systemd-user
# activation environments and signals readiness, so portals (screen-sharing via PipeWire, file dialogs) 
# and graphical-session.target user services start with a working Wayland connection.
# Replaces the manual dbus-update-activation-environment.
exec-once=uwsm finalize

# swaybg (wallpaper) has no systemd unit and needs no restart semantics, so run
# it via `uwsm app` — its own systemd scope, cleanly stopped when the session ends.
exec-once=uwsm app -- swaybg -i $HOME/.config/mango/assets/wallpaper.png -m fill
# waybar, hypridle and swaync are managed by systemd user services
# (*.service, WantedBy=graphical-session.target)
# and start with the session — do NOT launch them here.
# For swaync, a second instance is what froze the notification daemon on restart.

# Window effect
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=2
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
edge_scroller_focus_allow_speed=0.0
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=0
default_mfact=0.5
default_nmaster=1
smartgaps=0

# Dwindle Layout Setting
dwindle_smart_split=0
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=0

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=1
ov_no_resize=1
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=0
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
view_current_to_back=1
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1
drag_tile_small=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us,ru
xkb_rules_options=grp:switch,grp:win_space_toggle
# Super+Space toggles the layout via the grp:win_space_toggle xkb option above.
# Waybar reflects it live by subscribing to `mmsg watch keyboardlayout`
# (waybar/config.jsonc -> custom/keyboard), so no SIGRTMIN+1/pkill refresh is needed.

# Trackpad (tuned for Apple Magic Trackpad 2 -- macOS-like feel)
# need relogin to make it apply
disable_trackpad=0
tap_to_click=0
tap_and_drag=1
drag_lock=1
# click method: 2 = clickfinger (2-finger press = right-click, 3-finger = middle); 1 = button-areas; 0 = none
click_method=2
# natural, macOS-style scrolling direction
trackpad_natural_scrolling=1
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=1
gappiv=1
gappoh=0
gappov=0
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=1
rootcolor=0x0a5f38ff
bordercolor=0x0a5f3800
dropcolor=0x8FBA7C55
splitcolor=0xEB441EFF
focuscolor=0x00934fff
maximizescreencolor=0x89aa6100
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER+SHIFT,r,reload_config

# menu and terminal
bind=ALT+SHIFT,space,spawn,fuzzel
bind=ALT,space,spawn,tofi-drun --drun-launch=true
bind=Alt,Return,spawn,alacritty
bind=SUPER+SHIFT,Return,spawn,alacritty
bind=SUPER+SHIFT+ALT,Return,spawn,alacritty -e zellij

# applications (leftwm)
bind=SUPER+SHIFT,c,spawn,google-chrome-stable
bind=SUPER+SHIFT,e,spawn,emacsclient -c -a emacs
bind=SUPER+SHIFT,f,spawn,env GDK_BACKEND=wayland thunar
bind=SUPER+SHIFT,y,spawn,alacritty -e yazi
bind=SUPER,b,spawn,alacritty -e btop
bind=SUPER,v,spawn,pavucontrol

# exit
bind=SUPER+SHIFT,x,spawn,uwsm stop
bind=SUPER+SHIFT,q,killclient,

# lock screen -- hyprlock (leftwm used Mod+Ctrl+l)
bind=SUPER+CTRL,l,spawn,hyprlock

# notifications -- swaync (toggle control center, toggle do-not-disturb)
bind=SUPER,n,spawn,swaync-client -t -sw
bind=SUPER+SHIFT,n,spawn,swaync-client -d -sw

# screenshot -- grim + slurp + satty (Super+Shift+p: region, Super+Print: full screen)
# wrapped in single-quoted `sh -c` because mango spawn uses wordexp: a bare
# pipe/$() would be mis-parsed, so the quotes defer them to /bin/sh at runtime.
# annotated result is copied to clipboard (wl-copy) and saved under ~/Pictures/Screenshots.
bind=SUPER+SHIFT,p,spawn,sh -c 'mkdir -p ~/Pictures/Screenshots && grim -g "$(slurp)" - | satty -f - --copy-command wl-copy --output-filename ~/Pictures/Screenshots/satty-$(date +%Y%m%d-%H%M%S).png'
bind=SUPER,Print,spawn,sh -c 'mkdir -p ~/Pictures/Screenshots && grim - | satty -f - --copy-command wl-copy --output-filename ~/Pictures/Screenshots/satty-$(date +%Y%m%d-%H%M%S).png'

# switch window focus
# focus next/previous window in the stack (leftwm style)
bind=SUPER,j,focusstack,next
bind=SUPER,k,focusstack,prev
bind=SUPER,Down,focusstack,next
bind=SUPER,Up,focusstack,prev
# focus window directionally left/right (Super+h/l; Super+arrows reserved for view switch)
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# promote focused window to master (leftwm MoveWindowTop)
bind=SUPER,Return,zoom

# switch window status
bind=SUPER,g,toggleglobal,
bind=SUPER,Tab,toggleoverview,
bind=SUPER+CTRL,f,togglefloating,
bind=ALT,f,togglemaximizescreen,
bind=SUPER,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
# bind=ALT,z,toggle_scratchpad   # freed for zellij zoom (Alt z); anon scratchpad was never populated

# named scratchpads (leftwm) -- alacritty --class sets a stable app_id
windowrule=isnamedscratchpad:1,width:1280,height:800,appid:scratch-info
windowrule=isnamedscratchpad:1,width:1280,height:800,appid:scratch-notes
windowrule=isnamedscratchpad:1,width:1000,height:700,appid:scratch-nmtui
windowrule=isnamedscratchpad:1,width:1000,height:700,appid:scratch-volume
windowrule=isnamedscratchpad:1,width:1000,height:700,appid:scratch-cmus
bind=SUPER+ALT,i,toggle_named_scratchpad,scratch-info,none,alacritty --class scratch-info -e glow -p xnotes/info.md
bind=SUPER+ALT,s,toggle_named_scratchpad,scratch-notes,none,alacritty --class scratch-notes -e glow -p xnotes
bind=SUPER+ALT,n,toggle_named_scratchpad,scratch-nmtui,none,alacritty --class scratch-nmtui -e nmtui
bind=SUPER+ALT,v,toggle_named_scratchpad,scratch-volume,none,alacritty --class scratch-volume -e alsamixer
bind=SUPER+ALT,x,toggle_named_scratchpad,scratch-cmus,none,alacritty --class scratch-cmus -e cmus

# image viewer (imv) -- open images as a floating, centered window
windowrule=isfloating:1,appid:imv,width:1280,height:800

# video player (mpv) -- open as a floating, centered window at 70% of screen
windowrule=isfloating:1,appid:mpv,width:0.7,height:0.7

# Zoom (XWayland) -- it spawns many helper windows (toolbar, screen-share controls, notifications). 
# Tiling them resizes the windows, Zoom re-creates them, the WM re-tiles -> resize/flicker loop, 
# and the meeting window won't stay fullscreen. 
# Float every zoom window so Zoom owns its own geometry.
# appid here = X11 WM_CLASS (`zoom`); confirm with `xprop WM_CLASS` if unsure.
windowrule=isfloating:1,appid:zoom

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,
bind=alt+super+ctrl,Left,scroller_stack,left
bind=alt+super+ctrl,Right,scroller_stack,right
bind=alt+super+ctrl,Up,scroller_stack,up
bind=alt+super+ctrl,Down,scroller_stack,down

#dwindle layout(manual split mode)
bind=alt+shift,Return,dwindle_toggle_split_direction

# switch layout
bind=SUPER+CTRL,k,switch_layout
# direct layout selection (Super+Ctrl namespace; K cycles, letters jump)
bind=SUPER+CTRL,q,setlayout,tile
bind=SUPER+CTRL,w,setlayout,grid
bind=SUPER+CTRL,e,setlayout,deck
bind=SUPER+CTRL,r,setlayout,center_tile
bind=SUPER+CTRL,t,setlayout,right_tile
bind=SUPER+CTRL,y,setlayout,dwindle
bind=SUPER+CTRL,u,setlayout,fair

# tag switch
bind=SUPER,Left,viewtoleft,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=SUPER,Right,viewtoright,0
bind=CTRL,Right,viewtoright_have_client,0
bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# tagsilent: move client to the tag without following
bind=SUPER+ALT,1,tagsilent,1
bind=SUPER+ALT,2,tagsilent,2
bind=SUPER+ALT,3,tagsilent,3
bind=SUPER+ALT,4,tagsilent,4
bind=SUPER+ALT,5,tagsilent,5
bind=SUPER+ALT,6,tagsilent,6
bind=SUPER+ALT,7,tagsilent,7
bind=SUPER+ALT,8,tagsilent,8
bind=SUPER+ALT,9,tagsilent,9

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize


# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# Touchpad gestures (Apple Magic Trackpad 2) -- macOS-like swipes
# format: gesturebind=mods,direction,fingers,action[,params]
# 3-finger swipe: move focus between windows
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
# 4-finger swipe left/right: switch to the adjacent tag that has windows
gesturebind=none,left,4,viewtoleft_have_client
gesturebind=none,right,4,viewtoright_have_client
# 4-finger swipe up/down: toggle the overview (Mission Control-style)
gesturebind=none,up,4,toggleoverview
gesturebind=none,down,4,toggleoverview


# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi

# monitor: see wl-randr
monitorrule=model:LG HDR 4K,scale:1.50

