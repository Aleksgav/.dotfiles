# hypridle — idle daemon. Autostarted by mango (exec-once=hypridle).
# Linked to ~/.config/hypr/hypridle.conf by the installer (hypridle.rb post_install).
# Compositor-agnostic: uses logind/systemd so it works on mango (wlroots), and
# routes locking through hyprlock via lock_cmd. See also hyprlock.conf.

general {
    # Triggered on `loginctl lock-session`; guard against multiple hyprlock instances.
    lock_cmd = pidof hyprlock || hyprlock
    # Lock before the system suspends, so resume lands on the lock screen.
    before_sleep_cmd = loginctl lock-session
}

# Step 1: Dim the screen backlight after 2.5 minutes
listener {
    timeout = 150                                               # 2.5 minutes
    on-timeout = brightnessctl set 10% --duration=3000          # dims backlight (requires brightnessctl)
    on-resume = brightnessctl set 100% --duration=1000          # restores backlight brightness
}

# Lock the screen after 5 minutes of inactivity.
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Step 3: Turn off the monitor display entirely after 5.5 minutes
listener {
    timeout = 330                                # 5.5 minutes
    on-timeout = mango-ipc output dpms off       # uses MangoWM's native display power manager
    on-resume = mango-ipc output dpms on        # wakes the screen up on mouse/keyboard activity
}

# Suspend the system after 30 minutes of inactivity.
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
