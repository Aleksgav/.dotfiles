# hyprlock — screen locker, themed to match the polybar/Nord palette.
# Linked to ~/.config/hypr/hyprlock.conf by the installer (hyprlock.rb post_install).
# Invoked from mango via Super+Ctrl+l (see mango/config.conf).
# Colours mirror polybar/config.ini: bg #282A2E, bg-alt #373B41, fg #C5C8C6,
# primary #F0C674, secondary #8ABEB7, alert #A54242, disabled #707880.
# NB: in hyprlock '#' starts a comment, so colours use the rgba(RRGGBBAA) hex form.

general {
    hide_cursor = true
    grace = 0
    ignore_empty_input = true
    disable_loading_bar = true
}

background {
    monitor =
    color = rgba(282a2eff)
}

# clock
label {
    monitor =
    text = $TIME
    color = rgba(c5c8c6ff)
    font_size = 64
    font_family = FiraCode Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

# date
label {
    monitor =
    text = cmd[update:1000] date +"%Y/%m/%d  %A"
    color = rgba(f0c674ff)
    font_size = 20
    font_family = FiraCode Nerd Font
    position = 0, 24
    halign = center
    valign = center
}

# password input
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(f0c674ff)
    inner_color = rgba(373b41ff)
    font_color = rgba(c5c8c6ff)
    fail_color = rgba(a54242ff)
    check_color = rgba(8abeb7ff)
    fade_on_empty = false
    placeholder_text = Password…
    fail_text = $FAIL ($ATTEMPTS)
    rounding = 4
    position = 0, -40
    halign = center
    valign = center
}
