# xdg-desktop-portal backend routing for the mango (wlroots) session.
#
# Screen sharing and screenshots are served by the wlroots backend (xdg-desktop-portal-wlr, PipeWire-based); 
# everything else — file chooser, settings, notifications, etc. — falls back to the GTK backend (xdg-desktop-portal-gtk).
[preferred]
default=gtk
org.freedesktop.impl.portal.ScreenCast=wlr
org.freedesktop.impl.portal.Screenshot=wlr
