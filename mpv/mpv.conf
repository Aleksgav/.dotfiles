# mpv config -- see https://mpv.io/manual/master/
# Linked to ~/.config/mpv by the arch package post_install.

# Resume playback from where you left off
save-position-on-quit=yes

# Cap yt-dlp streaming at 1080p (mpv uses yt-dlp to play URLs)
ytdl-format=bestvideo[height<=?1080]+bestaudio/best

# Use native Wayland windows inside MangoWM
gpu-context=wayland

# Enable automated hardware video decoding (Mesa drivers)
hwdec=auto
vo=gpu

# Keep the window borderless and minimal to match a tiling aesthetic
# (window size is set by the mango window rule: width:0.7,height:0.7)
no-border

# Save battery/power by dropping heavy upscaling shaders
profile=fast

# Cache settings to prevent network stutters on weak Wi-Fi
cache=yes
demuxer-max-bytes=150MiB
demuxer-max-back-bytes=50MiB
